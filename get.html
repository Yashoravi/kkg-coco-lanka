<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote | KKG Coco Lanka</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f1e8;
      color:#333;
    }

    .quote-section{
      width:100%;
      min-height:100vh;
      padding:80px 10%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .quote-container{
      width:100%;
      max-width:1100px;
      background:#fff;
      border-radius:15px;
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .quote-left{
      background:url('images/coco-bg.jpg') center/cover;
      position:relative;
      padding:60px 40px;
      color:#fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .quote-left::before{
      content:'';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
    }

    .quote-left-content{
      position:relative;
      z-index:2;
    }

    .quote-left h1{
      font-size:42px;
      margin-bottom:20px;
    }

    .quote-left p{
      line-height:1.7;
      font-size:16px;
    }

    .quote-right{
      padding:50px 40px;
    }

    .quote-right h2{
      font-size:32px;
      margin-bottom:25px;
      color:#5c3b1e;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .form-group textarea{
      resize:none;
      height:120px;
    }

    .quote-btn{
      width:100%;
      padding:15px;
      border:none;
      background:#8b5a2b;
      color:#fff;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .quote-btn:hover{
      background:#6f4319;
    }

    .check-box{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
      font-size:14px;
    }

    @media(max-width:900px){

      .quote-container{
        grid-template-columns:1fr;
      }

      .quote-left{
        min-height:300px;
      }

    }

  </style>
</head>
<body>

<section class="quote-section">

  <div class="quote-container">

    <!-- Left Side -->

    <div class="quote-left">

      <div class="quote-left-content">

        <h1>Request a Quote</h1>

        <p>
          Get premium quality Coco Chips Bricks directly from Sri Lanka.
          Contact KKG Coco Lanka for bulk orders, custom packaging,
          and international export inquiries.
        </p>

      </div>

    </div>

    <!-- Right Side -->

    <div class="quote-right">

      <h2>Send Inquiry</h2>

      <form>

        <div class="form-group">
          <input type="text" placeholder="Full Name" required>
        </div>

        <div class="form-group">
          <input type="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
          <input type="text" placeholder="Company Name">
        </div>

        <div class="form-group">
          <select required>
            <option value="">Select Product</option>
            <option>Coco Chips Bricks</option>
            <option>Coco Peat Blocks</option>
            <option>Coir Fiber</option>
            <option>Grow Bags</option>
          </select>
        </div>

        <div class="form-group">
          <input type="text" placeholder="Required Quantity">
        </div>

        <div class="form-group">
          <textarea placeholder="Additional Notes"></textarea>
        </div>

        <div class="check-box">
          <input type="checkbox">
          <label>Request Sample Product</label>
        </div>

        <button type="submit" class="quote-btn">
          Submit Quote Request
        </button>

      </form>

    </div>

  </div>

</section>

</body>
</html>
